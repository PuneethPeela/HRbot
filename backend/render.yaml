services:
  - type: web
    name: hrbot-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hrbot-db
          property: connectionString

databases:
  - name: hrbot-db
    plan: free
    databaseName: hrbot
    user: hrbot_user
